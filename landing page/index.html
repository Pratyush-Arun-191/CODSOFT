<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h2>Linkedin</h2>
    </header>

    <main class="container">

        <div class="left">
            <h1>Welcome Back!</h1>
            <p>
                Sign in to continue accessing your dashboard and manage your
                account with ease. Stay connected and enjoy a seamless experience.
            </p>
        </div>

        <div class="right">

            <form class="login-form">

                <h2>Sign In</h2>

                <input
                    type="email"
                    placeholder="Email Address"
                    required
                >

                <input
                    type="password"
                    placeholder="Password"
                    required
                >

                <div class="options">
                    <label>
                        <input type="checkbox">
                        Remember Me
                    </label>

                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit">
                    Sign In
                </button>

                <p class="signup">
                    Don't have an account?
                    <a href="#">Register</a>
                </p>

            </form>

        </div>

    </main>

    <footer>
        © 2026 Linkedin | All Rights Reserved
    </footer>

</body>
</html>
